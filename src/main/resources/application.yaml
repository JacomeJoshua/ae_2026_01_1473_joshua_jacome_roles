spring:
  application:
    name: parking-roles

  datasource:
    url: jdbc:postgresql://localhost:5432/parkingdb
    username: admin
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # Issuer del User Pool del curso (autenticación básica del examen).
          # Spring descarga el JWKS de {issuer-uri}/.well-known/openid-configuration
          # y con él valida firma, emisor (iss) y expiración (exp) de cada access token.
          #
          # 👉 En el DEBER (homework_roles.md) reemplazarás esto por el issuer-uri de TU PROPIO
          #    User Pool, para poder crear los grupos ADMIN/USER y hacer autorización por roles.
          issuer-uri: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_soRV3sM2X

server:
  port: 8787

logging:
  level:
    org.springframework.security: INFO
